<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" width="1400" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Concrete 100 kB proof dissemination example</title>
  <desc id="desc">A calculation showing peak interval bandwidth for end-of-slot versus pipelined dissemination.</desc>
  <rect x="0" y="0" width="1400" height="760" fill="#ffffff"/>
  <text x="72" y="76" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">A concrete bandwidth frame</text>
  <text x="72" y="118" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Example numbers: 100 kB proof, 32 sampled columns, 6 kB per column diff, 3 second intervals.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="72" y="160" width="360" height="430" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="104" y="208" fill="#0f172a" font-size="28" font-weight="700">Assumptions</text>
    <g font-size="24" fill="#334155">
      <text x="104" y="264">slot = 12s</text>
      <text x="104" y="310">interval = 3s</text>
      <text x="104" y="356">updates = 4</text>
      <text x="104" y="402">proof = 100 kB</text>
      <text x="104" y="448">columns = 32</text>
      <text x="104" y="494">per-column = 6 kB</text>
    </g>
    <rect x="104" y="524" width="286" height="42" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="247" y="553" fill="#075985" font-size="21" font-weight="700" text-anchor="middle">diff/update = 192 kB</text>

    <rect x="520" y="160" width="360" height="430" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="552" y="208" fill="#0f172a" font-size="28" font-weight="700">End-of-slot</text>
    <text x="552" y="252" fill="#9a3412" font-size="22">one proof</text>
    <text x="552" y="286" fill="#9a3412" font-size="22">all sample bytes at end</text>
    <line x1="552" y1="326" x2="848" y2="326" stroke="#fdba74" stroke-width="2"/>
    <text x="552" y="374" fill="#334155" font-size="24">final interval bytes</text>
    <text x="552" y="422" fill="#334155" font-size="24">= 100 + 4 * 192</text>
    <rect x="552" y="462" width="280" height="62" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="3"/>
    <text x="692" y="503" fill="#9a3412" font-size="26" font-weight="700" text-anchor="middle">289.3 kB/s peak</text>
    <text x="552" y="558" fill="#64748b" font-size="18">868 kB over the final 3 seconds</text>

    <rect x="968" y="160" width="360" height="430" rx="16" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="1000" y="208" fill="#0f172a" font-size="28" font-weight="700">Pipelined</text>
    <text x="1000" y="252" fill="#1d4ed8" font-size="22">one proof per update</text>
    <text x="1000" y="286" fill="#1d4ed8" font-size="22">only the new diff each time</text>
    <line x1="1000" y1="326" x2="1296" y2="326" stroke="#93c5fd" stroke-width="2"/>
    <text x="1000" y="374" fill="#334155" font-size="24">interval bytes</text>
    <text x="1000" y="422" fill="#334155" font-size="24">= 100 + 192</text>
    <rect x="1000" y="462" width="280" height="62" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="1140" y="503" fill="#1d4ed8" font-size="26" font-weight="700" text-anchor="middle">97.3 kB/s peak</text>
    <text x="1000" y="558" fill="#64748b" font-size="18">292 kB over each 3 second interval</text>

    <rect x="72" y="638" width="1256" height="70" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="104" y="683" fill="#0f172a" font-size="24" font-weight="700">Result:</text>
    <text x="200" y="683" fill="#334155" font-size="23">end-of-slot needs about 3x higher peak interval bandwidth than the pipelined schedule.</text>
  </g>
</svg>
