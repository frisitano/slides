<svg xmlns="http://www.w3.org/2000/svg" width="988" height="866" viewBox="0 0 988 866">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#868e96"/>
    </marker>
    <style>
      .text{font-family:Virgil,Inter,Arial,sans-serif;fill:#1e1e1e}
      .mono{font-family:Cascadia,Menlo,monospace}
      .small{font-size:20px}
      .tiny{font-size:17px;fill:#868e96}
      .label{font-size:24px;font-weight:600}
      .bar{stroke-width:2.5;rx:12;ry:12}
      .arrow{stroke:#868e96;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#495057;stroke-width:2.5;stroke-dasharray:10 8;rx:18;ry:18}
    </style>
  </defs>

  <text x="494" y="40" text-anchor="middle" class="text" style="font-size:32px">RLC + FRI fold in circuit</text>
  <rect x="18" y="70" width="742" height="765" class="dash"/>
  <text x="24" y="62" class="text small" fill="#495057">ZKVM Circuit</text>
  <text x="775" y="94" class="text tiny">Private witness: rows C₀ … Cₘ₋₁</text>
  <text x="775" y="122" class="text tiny">Public output: roots + proof</text>

  <text x="28" y="118" class="text label" fill="#1971c2">① RLC</text>
  <text x="72" y="164" class="text small" fill="#e67700">ρ⁰ ·</text>
  <rect x="122" y="138" width="610" height="44" fill="#d0ebff" stroke="#1971c2" class="bar"/>
  <text x="426" y="167" text-anchor="middle" class="text mono small" fill="#1971c2">C₀[0]   C₀[1]   C₀[2]   ···   C₀[n-1]</text>

  <text x="55" y="215" class="text small">+</text>
  <text x="72" y="250" class="text small" fill="#e67700">ρ¹ ·</text>
  <rect x="122" y="224" width="610" height="44" fill="#d0ebff" stroke="#1971c2" class="bar"/>
  <text x="426" y="253" text-anchor="middle" class="text mono small" fill="#1971c2">C₁[0]   C₁[1]   C₁[2]   ···   C₁[n-1]</text>

  <text x="55" y="301" class="text small">+</text>
  <text x="72" y="336" class="text small" fill="#e67700">ρ² ·</text>
  <rect x="122" y="310" width="610" height="44" fill="#d0ebff" stroke="#1971c2" class="bar"/>
  <text x="426" y="339" text-anchor="middle" class="text mono small" fill="#1971c2">C₂[0]   C₂[1]   C₂[2]   ···   C₂[n-1]</text>

  <line x1="122" y1="390" x2="732" y2="390" stroke="#1e1e1e" stroke-width="3"/>
  <text x="55" y="399" class="text small">=</text>
  <rect x="122" y="410" width="610" height="50" fill="#d3f9d8" stroke="#2b8a3e" class="bar"/>
  <text x="426" y="442" text-anchor="middle" class="text mono small" fill="#2b8a3e">C★[j] = Σᵢ ρⁱ · Cᵢ[j]</text>
  <text x="775" y="438" class="text tiny">ρ = H(root₀, …, rootₘ₋₁)</text>

  <path d="M425 462 C425 492 425 507 425 536" class="arrow"/>
  <text x="28" y="528" class="text label" fill="#6741d9">② FRI folding</text>
  <rect x="120" y="554" width="612" height="46" fill="#e5dbff" stroke="#6741d9" class="bar"/>
  <text x="426" y="584" text-anchor="middle" class="text mono small" fill="#6741d9">fold₀(C★)     length n/2</text>
  <path d="M426 602 C426 622 426 634 426 650" class="arrow"/>
  <rect x="170" y="662" width="510" height="44" fill="#e5dbff" stroke="#6741d9" class="bar"/>
  <text x="426" y="690" text-anchor="middle" class="text mono small" fill="#6741d9">fold₁          length n/4</text>
  <path d="M426 708 C426 728 426 738 426 754" class="arrow"/>
  <rect x="250" y="766" width="350" height="42" fill="#fff3bf" stroke="#f59f00" class="bar"/>
  <text x="426" y="793" text-anchor="middle" class="text mono small" fill="#e67700">constant assertion</text>
</svg>
